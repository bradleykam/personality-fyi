<style>
:root {
  --ink: #0e0e0e;
  --paper: #f5f2ed;
  --cream: #ede9e1;
  --accent: #c8411a;
  --accent-light: #f5e8e3;
  --muted: #7a7670;
  --border: #d4cfc7;
  --card: #ffffff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Mono', monospace;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  font-size: 13px;
}
.page {
  max-width: 640px;
  margin: 0 auto;
  padding: 48px 24px 80px;
}
.assess-header {
  text-align: center;
  margin-bottom: 40px;
}
.wordmark {
  font-family: 'DM Serif Display', serif;
  font-size: 28px;
  letter-spacing: -1px;
  color: var(--ink);
  line-height: 1;
  margin-bottom: 6px;
}
.wordmark span { color: var(--accent); font-style: italic; }
.assess-company {
  font-size: 11px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 8px;
}
.assess-job-title {
  font-family: 'DM Serif Display', serif;
  font-size: 20px;
  color: var(--ink);
  margin-top: 4px;
}
@keyframes fadeInCard {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.assess-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 28px;
  animation: fadeInCard .25s ease;
}
.assess-intro {
  font-size: 13px;
  line-height: 1.8;
  color: var(--ink);
  margin-bottom: 20px;
}
.assess-input {
  width: 100%;
  padding: 12px 14px;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--cream);
  color: var(--ink);
  outline: none;
  transition: border-color .2s;
  margin-bottom: 12px;
}
.assess-input:focus { border-color: var(--accent); }
.assess-input::placeholder { color: var(--muted); }
.assess-consent {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  margin-bottom: 16px;
  font-size: 12px;
  color: var(--muted);
  line-height: 1.6;
}
.assess-consent input[type="checkbox"] {
  margin-top: 3px;
  flex-shrink: 0;
}
.assess-btn {
  width: 100%;
  padding: 14px;
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: 4px;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: .06em;
  cursor: pointer;
  transition: background .2s;
}
.assess-btn:hover { background: var(--accent); }
.assess-btn:disabled { background: var(--muted); cursor: not-allowed; }
.assess-error {
  font-size: 11px;
  color: var(--accent);
  margin-bottom: 10px;
  display: none;
}
.assess-error.show { display: block; }
/* Chat UI */
.test-chat {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-bottom: 24px;
  min-height: 200px;
}
.test-bubble {
  max-width: 80%;
  padding: 14px 18px;
  border-radius: 12px;
  font-size: 13px;
  line-height: 1.7;
  animation: fadeInCard .25s ease;
}
.test-bubble.app {
  align-self: flex-start;
  background: var(--cream);
  border: 1px solid var(--border);
  color: var(--ink);
}
.test-bubble.user {
  align-self: flex-end;
  background: var(--ink);
  color: var(--paper);
}
.test-bubble.result {
  max-width: 100%;
  align-self: flex-start;
  background: var(--cream);
  border: 1px solid var(--border);
  color: var(--ink);
}
.test-bubble .result-type {
  font-family: 'DM Serif Display', serif;
  font-size: 48px;
  letter-spacing: -2px;
  color: var(--ink);
  line-height: 1;
  margin-bottom: 8px;
}
.test-bubble .result-type .accent-letter { color: var(--accent); font-style: italic; }
.test-bubble .result-conf {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: .06em;
  text-transform: uppercase;
  margin-bottom: 16px;
}
.test-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}
.test-btn {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 8px 16px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: var(--cream);
  color: var(--ink);
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.test-btn:hover { border-color: var(--ink); }
.test-btn.primary {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}
.test-btn.primary:hover { background: var(--accent); border-color: var(--accent); }
.test-qcount {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: .06em;
  margin-top: 6px;
}
@media (max-width: 640px) {
  .test-buttons { display: grid; grid-template-columns: 1fr 1fr; }
  .test-bubble { max-width: 90%; }
}
.assess-complete {
  text-align: center;
  padding: 32px 0;
  animation: fadeInCard .3s ease;
}
.assess-complete h2 {
  font-family: 'DM Serif Display', serif;
  font-size: 24px;
  color: var(--ink);
  margin-bottom: 12px;
}
.assess-complete p {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.7;
  margin-bottom: 20px;
}
.assess-link-btn {
  display: inline-block;
  padding: 10px 24px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: .06em;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: transparent;
  color: var(--muted);
  text-decoration: none;
  transition: all .15s;
}
.assess-link-btn:hover { color: var(--accent); border-color: var(--accent); }
.assess-loading {
  text-align: center;
  padding: 48px 0;
  color: var(--muted);
}
.loading-dots span {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  margin: 0 3px;
  animation: pulse 1.2s ease-in-out infinite;
}
.loading-dots span:nth-child(2) { animation-delay: .2s; }
.loading-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes pulse {
  0%, 80%, 100% { opacity: .2; transform: scale(.8); }
  40% { opacity: 1; transform: scale(1); }
}

<div class="page">
  <div class="assess-header">
    <div class="wordmark">Type<span>Read</span></div>
    <div class="assess-company" id="assess-company"></div>
    <div class="assess-job-title" id="assess-job-title"></div>
  </div>

  <div id="assess-loading" class="assess-loading">
    <div class="loading-dots"><span></span><span></span><span></span></div>
    <div style="margin-top:14px;font-size:11px;letter-spacing:.06em;text-transform:uppercase">Loading assessment...</div>
  </div>

    <div class="assess-card" style="text-align:center">

        <input type="checkbox" id="assess-consent-check">
        <span id="assess-consent-text"></span>
      </label>
      <button class="assess-btn" id="assess-start-btn" disabled onclick="assessStartTest()">Start assessment &rarr;</button>
    </div>
  </div>

  <div id="assess-test-section" style="display:none">
    <div class="test-chat" id="test-chat"></div>

  </div>

  <div id="assess-complete-section" style="display:none"></div>
</div>

<script>
// ── Assessment page state ─────────────────────────────────────────
let assessData = null; // { companyName, employerId }
let assessEmail = '';

const TYPE_NAMES = {
  'INTJ':'Architect','INTP':'Logician','ENTJ':'Commander','ENTP':'Debater',
  'INFJ':'Advocate','INFP':'Mediator','ENFJ':'Protagonist','ENFP':'Campaigner',
  'ISTJ':'Logistician','ISFJ':'Defender','ESTJ':'Executive','ESFJ':'Consul',
  'ISTP':'Virtuoso','ISFP':'Adventurer','ESTP':'Entrepreneur','ESFP':'Entertainer'
};

// ── Load employer info ────────────────────────────────────────────
async function loadAssessment() {
  const params = new URLSearchParams(window.location.search);
  const company = params.get('company');

  if (!company) {
    showError('This assessment link is missing required parameters.');
    return;
  }

  try {
    const resp = await fetch('/.netlify/functions/get-posting?company=' + encodeURIComponent(company));
    const data = await resp.json();
    if (!resp.ok || data.error) {
      showError(data.error || 'Company not found.');
      return;
    }
    assessData = data;
    showIntro();
  } catch(e) {
    showError('Could not load assessment. Please check your connection and try again.');
  }
}

function showError(msg) {
  document.getElementById('assess-loading').style.display = 'none';
  document.getElementById('assess-error-msg').textContent = msg;
  document.getElementById('assess-error-page').style.display = 'block';
}

function showIntro() {
  document.getElementById('assess-loading').style.display = 'none';
  document.getElementById('assess-company').textContent = 'Assessment for ' + assessData.companyName;
  document.getElementById('assess-job-title').textContent = '';
  document.getElementById('assess-intro-text').textContent =
    'This assessment takes about 5 minutes. ' + assessData.companyName +
    ' will use your results to understand how you work and communicate. Your results will be shared with them.';
  document.getElementById('assess-consent-text').textContent =
    'I agree to share my personality assessment results with ' + assessData.companyName;
  document.getElementById('assess-intro-section').style.display = 'block';

  // Enable button when email + consent
  const emailInput = document.getElementById('assess-email');
  const checkbox = document.getElementById('assess-consent-check');
  const btn = document.getElementById('assess-start-btn');
  function checkReady() {
    btn.disabled = !(emailInput.value.trim() && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value.trim()) && checkbox.checked);
  }
  emailInput.addEventListener('input', checkReady);
  checkbox.addEventListener('change', checkReady);
}

function assessStartTest() {
  const email = document.getElementById('assess-email').value.trim();
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    document.getElementById('assess-email-error').textContent = 'Please enter a valid email address.';
    document.getElementById('assess-email-error').className = 'assess-error show';
    return;
  }
  assessEmail = email;
  document.getElementById('assess-intro-section').style.display = 'none';
  document.getElementById('assess-test-section').style.display = 'block';
  testStart();
}

// ── Test engine (60 questions, 15 per axis; mirrors main app) ─────
const TEST_QS = [
  {q:"After a long social event, do you usually need time alone to recharge?", ax:"I_E", yes:"I", no:"E"},
  {q:"Do you tend to focus more on possibilities and what could be than on what currently is?", ax:"N_S", yes:"N", no:"S"},
  {q:"When making a decision, do you prioritize logic and what makes sense over how it affects people?", ax:"T_F", yes:"T", no:"F"},
  {q:"Do you prefer having a plan and sticking to it over keeping your options open?", ax:"J_P", yes:"J", no:"P"},
  {q:"Do you tend to think things through before speaking rather than thinking out loud?", ax:"I_E", yes:"I", no:"E"},
  {q:"Do you often find yourself reading between the lines rather than taking things at face value?", ax:"N_S", yes:"N", no:"S"},
  {q:"Do you think it's more important to be honest than to be tactful, even if it stings?", ax:"T_F", yes:"T", no:"F"},
  {q:"Does leaving things unfinished or unresolved bother you more than most?", ax:"J_P", yes:"J", no:"P"},
  {q:"Would you rather have a deep conversation with one person than mingle with a group?", ax:"I_E", yes:"I", no:"E"},
  {q:"Do you prefer thinking about the big picture over focusing on specific details?", ax:"N_S", yes:"N", no:"S"},
  {q:"When a friend comes to you with a problem, is your first instinct to help them solve it rather than just listen?", ax:"T_F", yes:"T", no:"F"},
  {q:"Do you usually decide early and commit, rather than waiting to see how things develop?", ax:"J_P", yes:"J", no:"P"},
  {q:"Do you find that too much social time leaves you feeling drained, even when you enjoyed it?", ax:"I_E", yes:"I", no:"E"},
  {q:"Do you tend to trust a hunch even when you can't fully explain why?", ax:"N_S", yes:"N", no:"S"},
  {q:"Do you find it easier to stay objective when there's emotional conflict around you?", ax:"T_F", yes:"T", no:"F"},
  {q:"Do you find it easier to work with deadlines than without them?", ax:"J_P", yes:"J", no:"P"},
  {q:"Do you prefer working independently over collaborating in real time?", ax:"I_E", yes:"I", no:"E"},
  {q:"Do you find abstract or theoretical conversations more interesting than practical ones?", ax:"N_S", yes:"N", no:"S"},
  {q:"Do you tend to evaluate ideas on their merit rather than who proposed them?", ax:"T_F", yes:"T", no:"F"},
  {q:"Do you generally prefer structure and clear expectations over flexibility and improvisation?", ax:"J_P", yes:"J", no:"P"},
  {q:"Do you tend to have a small circle of close friends rather than a wide network?", ax:"I_E", yes:"I", no:"E"},
  {q:"Do you often think about patterns and connections between ideas, even in unrelated areas?", ax:"N_S", yes:"N", no:"S"},
  {q:"Do you find that you're rarely swayed by appeals to emotion when making important decisions?", ax:"T_F", yes:"T", no:"F"},
  {q:"Do you tend to finish tasks well before the deadline rather than working up to the wire?", ax:"J_P", yes:"J", no:"P"},
  // Expansion 2026-04-22 — 9 new per axis
  {q:"At a party full of strangers, do you tend to wait for others to approach you rather than start conversations yourself?", ax:"I_E", yes:"I", no:"E"},
  {q:"Do you need quiet time after a stimulating workday to feel like yourself again?", ax:"I_E", yes:"I", no:"E"},
  {q:"When brainstorming in a group, do you prefer to think privately before speaking up?", ax:"I_E", yes:"I", no:"E"},
  {q:"Do your best ideas usually come to you when you're alone rather than in conversation?", ax:"I_E", yes:"I", no:"E"},
  {q:"Is your ideal Saturday night more likely to involve 2\u20133 close friends than a large group?", ax:"I_E", yes:"I", no:"E"},
  {q:"After a good conversation with someone new, do you typically feel more tired than energized?", ax:"I_E", yes:"I", no:"E"},
  {q:"Do you find small talk genuinely exhausting rather than just forgettable?", ax:"I_E", yes:"I", no:"E"},
  {q:"Do you tend to arrive at social events later and leave earlier than most people?", ax:"I_E", yes:"I", no:"E"},
  {q:"In group settings, do others usually talk more than you do?", ax:"I_E", yes:"I", no:"E"},
  {q:"When learning something new, do you prefer to start with the underlying concept rather than concrete examples?", ax:"N_S", yes:"N", no:"S"},
  {q:"Do you frequently catch yourself imagining future possibilities instead of focusing on what's in front of you?", ax:"N_S", yes:"N", no:"S"},
  {q:"When you read fiction, are you more drawn to its themes and meaning than to its plot events?", ax:"N_S", yes:"N", no:"S"},
  {q:"Do you tend to remember the overall impression of a conversation more than the specific things said?", ax:"N_S", yes:"N", no:"S"},
  {q:"When describing an experience, do you naturally emphasize what it meant rather than exactly what happened?", ax:"N_S", yes:"N", no:"S"},
  {q:"When making a decision, do you often imagine multiple future scenarios rather than rely on past patterns?", ax:"N_S", yes:"N", no:"S"},
  {q:"Do metaphors and analogies come more naturally to you than precise descriptions?", ax:"N_S", yes:"N", no:"S"},
  {q:"Are you more drawn to what's innovative and experimental than to what's proven and reliable?", ax:"N_S", yes:"N", no:"S"},
  {q:"When meeting someone new, are you more interested in their worldview than in their life story?", ax:"N_S", yes:"N", no:"S"},
  {q:"When a colleague makes a mistake, is your first instinct to analyze what went wrong rather than check how they're feeling?", ax:"T_F", yes:"T", no:"F"},
  {q:"Do you believe clear criticism is kinder than polite omission?", ax:"T_F", yes:"T", no:"F"},
  {q:"When you disagree with someone close to you, do you push back even if it risks the peace?", ax:"T_F", yes:"T", no:"F"},
  {q:"Would you rather be respected for your competence than liked for your warmth?", ax:"T_F", yes:"T", no:"F"},
  {q:"When evaluating an argument, can you set aside who made it and focus purely on its logic?", ax:"T_F", yes:"T", no:"F"},
  {q:"When making plans, do you usually think about cost and efficiency before how it feels to everyone involved?", ax:"T_F", yes:"T", no:"F"},
  {q:"If a friend's business is struggling, is your first instinct to offer analysis rather than emotional support?", ax:"T_F", yes:"T", no:"F"},
  {q:"Do you tend to push back on ideas you disagree with, even in casual conversation?", ax:"T_F", yes:"T", no:"F"},
  {q:"Do you think fairness is more about consistent principles than about outcomes people feel good about?", ax:"T_F", yes:"T", no:"F"},
  {q:"Do you tend to keep your workspace organized rather than cluttered?", ax:"J_P", yes:"J", no:"P"},
  {q:"Do you feel uncomfortable when an important decision is left open for too long?", ax:"J_P", yes:"J", no:"P"},
  {q:"When you travel, do you plan your itinerary day-by-day rather than figure it out as you go?", ax:"J_P", yes:"J", no:"P"},
  {q:"Do you use to-do lists that you actually follow rather than make casually and abandon?", ax:"J_P", yes:"J", no:"P"},
  {q:"Do unexpected changes to your plans usually bother you more than they energize you?", ax:"J_P", yes:"J", no:"P"},
  {q:"Would you rather have a predictable routine than a constantly changing schedule?", ax:"J_P", yes:"J", no:"P"},
  {q:"When you start a project, do you typically map out the full timeline before diving in?", ax:"J_P", yes:"J", no:"P"},
  {q:"Do you make reservations and bookings well in advance rather than last-minute?", ax:"J_P", yes:"J", no:"P"},
  {q:"Do you tend to show up early to appointments rather than right on time?", ax:"J_P", yes:"J", no:"P"}
];

let testScores = {I:0, E:0, N:0, S:0, T:0, F:0, J:0, P:0};
let testAnsweredByAxis = {I_E:0, N_S:0, T_F:0, J_P:0};
let testSkippedAxis = {I_E:false, N_S:false, T_F:false, J_P:false};
let testConsecUnsureByAxis = {I_E:0, N_S:0, T_F:0, J_P:0};
let testQueueIdx = 0;
let testQueue = [];
let testAnswered = 0;

function testReset() {
  testScores = {I:0, E:0, N:0, S:0, T:0, F:0, J:0, P:0};
  testAnsweredByAxis = {I_E:0, N_S:0, T_F:0, J_P:0};
  testSkippedAxis = {I_E:false, N_S:false, T_F:false, J_P:false};
  testConsecUnsureByAxis = {I_E:0, N_S:0, T_F:0, J_P:0};
  testQueueIdx = 0;
  testQueue = TEST_QS.map(function(q, i) { return i; });
  testAnswered = 0;
  document.getElementById('test-chat').innerHTML = '';
  document.getElementById('test-buttons-area').innerHTML = '';
}

function testAddBubble(text, type) {
  var chat = document.getElementById('test-chat');
  var div = document.createElement('div');
  div.className = 'test-bubble ' + type;
  div.innerHTML = text;
  chat.appendChild(div);
  setTimeout(function() { div.scrollIntoView({ behavior: 'smooth', block: 'end' }); }, 50);
}

function testSetButtons(buttons, qCountText) {
  var area = document.getElementById('test-buttons-area');
  area.innerHTML = '';
  var wrap = document.createElement('div');
  wrap.className = 'test-buttons';
  buttons.forEach(function(b) {
    var btn = document.createElement('button');
    btn.className = b.primary ? 'test-btn primary' : 'test-btn';
    btn.textContent = b.label;
    btn.addEventListener('click', b.action);
    wrap.appendChild(btn);
  });
  area.appendChild(wrap);
  if (qCountText) {
    var qc = document.createElement('div');
    qc.className = 'test-qcount';
    qc.textContent = qCountText;
    area.appendChild(qc);
  }
}

function testStart() {
  testReset();
  testAddBubble("Let\u2019s find your type. I\u2019ll ask you up to 60 questions \u2014 answer honestly, not how you think you should answer. The test adapts: once an axis is clearly resolved, remaining questions on it are skipped.", 'app');
  testSetButtons([{ label: "Let's go", primary: true, action: testBegin }]);
}

function testBegin() {
  document.getElementById('test-buttons-area').innerHTML = '';
  testShowNext();
}

function testRemainingForAxis(ax) {
  var count = 0;
  for (var i = testQueueIdx; i < testQueue.length; i++) {
    if (TEST_QS[testQueue[i]].ax === ax) count++;
  }
  return count;
}

function testAxisDecided(ax) {
  if (testSkippedAxis[ax]) return true;
  var letters = ax.split('_');
  var a = letters[0], b = letters[1];
  var remaining = testRemainingForAxis(ax);
  var maxRemaining = remaining * 2;
  var diff = Math.abs(testScores[a] - testScores[b]);
  if (diff > maxRemaining) return true;
  if (testAnsweredByAxis[ax] >= 10 && diff >= 16) return true;
  return false;
}

function testShouldSkip(qIndex) {
  return testAxisDecided(TEST_QS[qIndex].ax);
}

function testCountRemaining() {
  var count = 0;
  for (var i = testQueueIdx; i < testQueue.length; i++) {
    if (!testShouldSkip(testQueue[i])) count++;
  }
  return count;
}

function testShowNext() {
  while (testQueueIdx < testQueue.length && testShouldSkip(testQueue[testQueueIdx])) {
    testQueueIdx++;
  }
  if (testQueueIdx >= testQueue.length) {
    testFinish();
    return;
  }
  var qi = testQueue[testQueueIdx];
  var q = TEST_QS[qi];
  var remaining = testCountRemaining();
  setTimeout(function() {
    testAddBubble(q.q, 'app');
    testSetButtons([
      { label: 'Yes', primary: false, action: function() { testAnswer('yes'); } },
      { label: 'No', primary: false, action: function() { testAnswer('no'); } },
      { label: 'In Between', primary: false, action: function() { testAnswer('between'); } },
      { label: 'Not Sure', primary: false, action: function() { testAnswer('unsure'); } }
    ], 'Question ' + (testAnswered + 1) + ' of ' + (testAnswered + remaining));
  }, 400);
}

function testAnswer(choice) {
  var qi = testQueue[testQueueIdx];
  var q = TEST_QS[qi];
  var labels = { yes: 'Yes', no: 'No', between: 'In Between', unsure: 'Not Sure' };
  testAddBubble(labels[choice], 'user');
  // Scoring: Yes/No = +2 to winning side. Between / Unsure = 0 (no diff change).
  if (choice === 'yes') testScores[q.yes] += 2;
  else if (choice === 'no') testScores[q.no] += 2;
  // 'between' and 'unsure' add 0 to both sides.

  if (choice === 'unsure') {
    testConsecUnsureByAxis[q.ax] = (testConsecUnsureByAxis[q.ax] || 0) + 1;
  } else {
    testConsecUnsureByAxis[q.ax] = 0;
  }

  testAnsweredByAxis[q.ax]++;
  testAnswered++;
  testQueueIdx++;
  document.getElementById('test-buttons-area').innerHTML = '';

  if (testConsecUnsureByAxis[q.ax] >= 3 && !testSkippedAxis[q.ax]) {
    testOfferSkipAxis(q.ax);
    return;
  }

  testShowNext();
}

function testOfferSkipAxis(ax) {
  setTimeout(function() {
    testAddBubble("You've marked \u201CNot Sure\u201D three times in a row on this section. Skip the rest of it?", 'app');
    testSetButtons([
      { label: 'Yes, skip this section', primary: true, action: function() {
          testSkippedAxis[ax] = true;
          document.getElementById('test-buttons-area').innerHTML = '';
          testShowNext();
        } },
      { label: 'Keep going', primary: false, action: function() {
          testConsecUnsureByAxis[ax] = 0;
          document.getElementById('test-buttons-area').innerHTML = '';
          testShowNext();
        } }
    ]);
  }, 400);
}

async function testFinish() {
  document.getElementById('test-buttons-area').innerHTML = '';
  testAddBubble('Calculating your type...', 'app');

  // Spectrum scoring: confidence per axis = round((winner - loser)/30*100), clamped [1,99].
  var axes = [['I','E'],['N','S'],['T','F'],['J','P']];
  var defaults = ['I','N','T','J'];
  var resultType = '';
  var pct = {};
  var axisBreakdown = {};

  axes.forEach(function(pair, idx) {
    var a = pair[0], b = pair[1];
    var winner, diff;
    if (testScores[a] > testScores[b]) { winner = a; diff = testScores[a] - testScores[b]; resultType += a; }
    else if (testScores[b] > testScores[a]) { winner = b; diff = testScores[b] - testScores[a]; resultType += b; }
    else { winner = defaults[idx]; diff = 0; resultType += defaults[idx]; }
    var p = Math.round(diff / 30 * 100);
    p = Math.max(1, Math.min(99, p));
    pct[winner] = p;
    axisBreakdown[pair.join('_')] = winner + '+' + diff;
  });

  var conf = Math.round(Object.values(pct).reduce(function(a, x) { return a + x; }, 0) / 4);
  var confLabel = conf >= 75 ? 'High' : conf >= 45 ? 'Moderate' : 'Low';

  var letters = resultType.split('').map(function(l, i) {
    return i === 0 ? '<span class="accent-letter">' + l + '</span>' : l;
  }).join('');

  var spectrumRow = resultType.split('').map(function(l) { return l + '(' + pct[l] + '%)'; }).join(' ');

  testAddBubble(
    '<div class="result-type">' + letters + '</div>' +
    '<div style="font-family:\'DM Serif Display\',serif;font-size:18px;color:var(--muted);margin-bottom:4px">' + (TYPE_NAMES[resultType] || '') + '</div>' +
    '<div style="font-family:\'DM Mono\',monospace;font-size:14px;color:var(--ink);letter-spacing:.05em;margin-bottom:6px">' + spectrumRow + '</div>' +
    '<div class="result-conf">' + conf + '% overall confidence \u00B7 ' + confLabel + '</div>',
    'result'
  );

  testAddBubble('Submitting your results...', 'app');

  try {
    var resp = await fetch('/.netlify/functions/create-candidate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: assessEmail,
        type: resultType,
        confidenceScore: conf,
        percentages: pct,
        employerId: assessData.employerId,
        axisIE: axisBreakdown['I_E'],
        axisNS: axisBreakdown['N_S'],
        axisTF: axisBreakdown['T_F'],
        axisJP: axisBreakdown['J_P']
      })
    });
    var result = await resp.json();
    if (!resp.ok) throw new Error(result.error || 'Submit failed');
  } catch(e) {
    console.error('Submit error:', e);
  }

  // Show completion
  setTimeout(function() {
    document.getElementById('assess-test-section').style.display = 'none';
    var el = document.getElementById('assess-complete-section');
    el.innerHTML =
      '<div class="assess-complete">' +
      '<h2>Assessment complete</h2>' +
      '<p>Your results have been submitted to ' + assessData.companyName + '.</p>' +
      '<p style="margin-top:24px;font-size:11px;color:var(--muted)">Want to explore your personality type further?</p>' +
      '<a href="/?type=' + resultType + '" class="assess-link-btn">See your full personality.fyi profile &rarr;</a>' +
      '</div>';
    el.style.display = 'block';
  }, 1000);
}

// ── Init ──────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', loadAssessment);
</script>
